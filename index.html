<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album & Denah USP PSAJ F4 - Professional Edition</title>
    <!-- Library untuk Excel & ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 360px;
            --primary: #064e3b; /* Hijau Botol */
            --primary-dark: #022c22;
            --accent: #10b981;
            --accent-hover: #059669;
            --bg-canvas: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-canvas);
            color: #1e293b;
        }

        /* SIDEBAR STYLING */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--primary);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
            z-index: 1000;
            color: #ffffff;
        }

        .sidebar-header {
            padding: 30px 25px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header h3 { 
            margin: 0; font-size: 1.25rem; font-weight: 800; color: #ffffff;
            display: flex; align-items: center; gap: 10px;
        }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }

        .accordion-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            overflow: hidden; transition: all 0.3s ease;
        }

        .accordion-header {
            padding: 16px 20px; cursor: pointer; font-weight: 700; font-size: 0.85rem;
            display: flex; justify-content: space-between; align-items: center; color: #ffffff;
        }

        .accordion-header.active { background: var(--accent); color: #fff; }
        .accordion-header i { display: flex; align-items: center; gap: 10px; font-style: normal; }

        .accordion-content {
            padding: 0 20px; max-height: 0; overflow: hidden;
            transition: all 0.3s ease-in-out; background: rgba(0,0,0,0.2);
        }

        .accordion-content.show { padding: 20px; max-height: 1200px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { 
            display: block; font-size: 10px; font-weight: 800; margin-bottom: 6px; 
            color: #ffffff; text-transform: uppercase; opacity: 0.8;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; font-size: 13px; background: rgba(255,255,255,0.1);
            color: white; outline: none;
        }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 11px;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-blue { background: var(--accent); color: white; }
        .btn-outline { border: 1px solid rgba(255,255,255,0.3); background: transparent; color: #ffffff; }

        /* PREVIEW AREA */
        .main-content {
            margin-left: var(--sidebar-width); flex-grow: 1;
            padding: 30px; display: flex; flex-direction: column; align-items: center;
        }

        /* PAPER F4 PRECISION (215x330mm) */
        .page {
            width: 215mm;
            height: 330mm;
            padding: 10mm 12mm;
            background: white;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            page-break-after: always;
        }

        /* KOP SURAT */
        .header {
            text-align: center; border-bottom: 4px double #000; padding-bottom: 8px;
            margin-bottom: 12px; position: relative; flex-shrink: 0;
        }
        .logo-img { position: absolute; left: 18mm; top: -1mm; width: 95px; height: 115px; object-fit: contain; }
        .header h1 { margin: 0; font-size: 12pt; text-transform: uppercase; line-height: 1.1; letter-spacing: 0.5px; }
        .header h2 { margin: 1px 0; font-size: 15pt; font-weight: 900; text-transform: uppercase; line-height: 1.1;}
        .header p { margin: 1px 0; font-size: 8.5pt; font-weight: 500; }
        .header .email-text { color: blue; text-decoration: underline; font-size: 8pt; }

        .sub-header {
            text-align: center; margin-bottom: 10px; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .sub-header h4 { 
            margin: 0; font-size: 10pt; text-transform: uppercase; font-weight: 800;
            border: 1.5px solid #000; padding: 4px 15px; margin-bottom: 4px;
            background: #fff; line-height: 1.2;
        }
        .room-box { 
            font-size: 14pt; font-weight: 900; margin: 1px 0; border: 1.5px solid #000; 
            display: inline-block; padding: 1px 22px; background: #fff;
        }
        .year-text { font-weight: 700; font-size: 10pt; text-transform: uppercase; }

        /* GRID CONTENT */
        .photo-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr);
            gap: 8px 6px; justify-items: center; flex-grow: 1; align-content: start;
        }

        .student-card { width: 3.8cm; display: flex; flex-direction: column; align-items: center; }
        .photo-frame {
            width: 2.8cm; height: 3.8cm; border: 1px solid #000; background: #fff;
            display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; z-index: 2; }
        .no-img-text { position: absolute; font-size: 5pt; color: #000; opacity: 0.25; text-align: center; text-transform: uppercase; font-weight: bold; z-index: 1; }

        .id-label { margin-top: 3px; background: #ffff00; border: 1px solid #000; width: 3.6cm; padding: 1px 0; text-align: center; font-weight: 800; font-size: 8.5pt; }
        .student-info { font-size: 7.5pt; text-align: center; margin-top: 1px; font-weight: 700; line-height: 1; }

        /* DENAH GRID */
        .denah-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); gap: 12px 10px; justify-items: center; flex-grow: 1; }
        .teacher-desk { align-self: flex-start; margin-left: 20px; border: 1.5px solid #000; background: #d4d4aa; padding: 4px 12px; font-weight: bold; font-size: 8.5pt; margin-bottom: 12px; text-transform: uppercase; }
        .seat-card { width: 3.8cm; border: 1.2px solid #000; display: flex; flex-direction: column; }
        .seat-header { background: #fff; border-bottom: 1.2px solid #000; text-align: center; font-size: 7.5pt; font-weight: 800; padding: 2px; }
        .seat-number { text-align: center; font-size: 9pt; font-weight: bold; padding: 6px 2px; border-bottom: 1.2px solid #000; }
        .seat-footer { display: flex; height: 26px; }
        .footer-left { flex: 1; background: #fff; border-right: 1.2px solid #000; }
        .footer-right { flex: 1; background: #c0adc5; }

        @media print {
            @page { size: 215mm 330mm; margin: 0; }
            body { background: white; }
            .sidebar, .no-print { display: none !important; }
            .main-content { margin: 0; padding: 0; width: 215mm; }
            .page { box-shadow: none; margin: 0; width: 215mm; height: 330mm; border: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar no-print">
        <div class="sidebar-header">
            <h3>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8l-4 4v16a2 2 0 0 0 2 2z"></path><path d="M14 2v4a2 2 0 0 0 2 2h4"></path><path d="M16 13H8"></path><path d="M16 17H8"></path><path d="M10 9H8"></path></svg>
                APLIKASI ALBUM DAN DENAH
            </h3>
        </div>

        <div class="sidebar-content">
            <!-- 1. DATA INSTANSI -->
            <div class="accordion-item">
                <div class="accordion-header active" onclick="toggleAccordion(this)">
                    <i><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> DATA INSTANSI</i>
                    <span>▼</span>
                </div>
                <div class="accordion-content show">
                    <div class="form-group">
                        <label>Status Sekolah</label>
                        <select id="in-status" onchange="handleStatusChange()">
                            <option value="negeri">Negeri (Logo Kab. Bekasi)</option>
                            <option value="swasta">Swasta (Upload Logo Manual)</option>
                        </select>
                    </div>
                    <div class="form-group" id="logo-upload-group" style="display: none;">
                        <label>Logo Sekolah Kustom</label>
                        <input type="file" id="in-logo" accept="image/*" onchange="handleLogo(this)">
                    </div>
                    <div class="form-group">
                        <label>Nama Sekolah</label>
                        <input type="text" id="in-school" value="SDN MUARA BAKTI 01" oninput="updateUI()">
                    </div>
                    <div class="form-group">
                        <label>Nama Kecamatan</label>
                        <input type="text" id="in-dist" value="KECAMATAN BABELAN" oninput="updateUI()">
                    </div>
                    <div class="form-group">
                        <label>Alamat Sekolah</label>
                        <input type="text" id="in-addr" value="Jl. Bayangkara Rt. 12/07 Ds. Muara Bakti" oninput="updateUI()">
                    </div>
                    <div class="form-group">
                        <label>Email Sekolah</label>
                        <input type="text" id="in-email" value="sdnmuarabakti01@gmail.com" oninput="updateUI()">
                    </div>
                    <div class="form-group">
                        <label>Judul Dokumen (Halaman 1)</label>
                        <input type="text" id="in-title" value="ALBUM FOTO UJIAN SATUAN PENDIDIKAN" oninput="updateUI()">
                    </div>
                    <div class="form-group">
                        <label>Ruangan (Mulai Dari)</label>
                        <input type="text" id="in-room" value="01" oninput="updateUI()">
                    </div>
                    <div class="form-group">
                        <label>Tahun Pelajaran</label>
                        <input type="text" id="in-year" value="2025 / 2026" oninput="updateUI()">
                    </div>
                </div>
            </div>

            <!-- 2. IMPORT DATA -->
            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <i><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> IMPORT DATA & FOTO</i>
                    <span>▼</span>
                </div>
                <div class="accordion-content">
                    <button class="btn btn-outline" onclick="downloadTemplate()">📥 Template Excel</button>
                    <div class="form-group">
                        <label>1. Upload Excel</label>
                        <input type="file" id="import-excel" accept=".xlsx, .xls">
                    </div>
                    <div class="form-group">
                        <label>2. Upload Foto (ZIP/FOLDER)</label>
                        <input type="file" id="import-photos" multiple accept="image/*, .zip">
                    </div>
                    <button class="btn btn-outline" style="background: #ef4444; color:white; border:none;" onclick="clearData()">🗑️ Hapus Semua Data</button>
                </div>
            </div>

            <!-- 3. PILIH MODE & URUTAN -->
            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <i><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg> PILIH MODE & URUTAN</i>
                    <span>▼</span>
                </div>
                <div class="accordion-content">
                    <div class="form-group">
                        <label>Mode Dokumen</label>
                        <select id="in-mode" onchange="updateUI()">
                            <option value="album">Album Foto Peserta</option>
                            <option value="denah">Denah Kursi Peserta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bentuk Urutan</label>
                        <select id="in-layout" onchange="updateUI()">
                            <option value="vertical">Vertikal (Ke Bawah)</option>
                            <option value="zigzag">Zigzag (Ke Samping)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 4. CETAK DOKUMEN -->
            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <i><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg> CETAK DOKUMEN</i>
                    <span>▼</span>
                </div>
                <div class="accordion-content">
                    <button class="btn btn-blue" onclick="window.print()">🖨️ CETAK SEKARANG</button>
                    <p style="font-size: 9px; opacity: 0.8; text-align: center;">Pastikan ukuran kertas di setting print adalah F4/Folio dan Margin: None.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content" id="pages-container"></div>

    <script>
        const LOGO_KAB_BEKASI = "https://freeimghost.com/images/2026/01/22/Kabupaten-Bekasi.md.png";
        let students = [];
        let photoMap = {};
        let schoolLogo = LOGO_KAB_BEKASI;

        // INDEXEDDB LOGIC FOR PERMANENT PHOTOS
        const dbName = "USP_DB_PRO";
        const storeName = "PhotosStore";

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(storeName);
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function savePhotosToDB(photos) {
            const db = await openDB();
            const tx = db.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);
            for (const key in photos) { store.put(photos[key], key); }
            return new Promise(resolve => tx.oncomplete = () => resolve());
        }

        async function loadPhotosFromDB() {
            const db = await openDB();
            const tx = db.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const request = store.openCursor();
            return new Promise((resolve) => {
                const results = {};
                request.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (cursor) { results[cursor.key] = cursor.value; cursor.continue(); }
                    else { resolve(results); }
                };
            });
        }

        async function clearPhotosDB() {
            const db = await openDB();
            const tx = db.transaction(storeName, "readwrite");
            store = tx.objectStore(storeName);
            store.clear();
        }

        // SETTINGS PERSISTENCE
        function saveSettingsToLocal() {
            const settings = {
                status: document.getElementById('in-status').value,
                school: document.getElementById('in-school').value,
                dist: document.getElementById('in-dist').value,
                addr: document.getElementById('in-addr').value,
                email: document.getElementById('in-email').value,
                title: document.getElementById('in-title').value,
                room: document.getElementById('in-room').value,
                year: document.getElementById('in-year').value,
                mode: document.getElementById('in-mode').value,
                layout: document.getElementById('in-layout').value,
                schoolLogo: schoolLogo
            };
            localStorage.setItem('usp_settings_v3', JSON.stringify(settings));
            localStorage.setItem('usp_students_v3', JSON.stringify(students));
        }

        async function loadFromLocal() {
            const savedSettings = localStorage.getItem('usp_settings_v3');
            const savedStudents = localStorage.getItem('usp_students_v3');
            photoMap = await loadPhotosFromDB();

            if (savedSettings) {
                const s = JSON.parse(savedSettings);
                document.getElementById('in-status').value = s.status;
                document.getElementById('in-school').value = s.school;
                document.getElementById('in-dist').value = s.dist;
                document.getElementById('in-addr').value = s.addr;
                document.getElementById('in-email').value = s.email;
                document.getElementById('in-title').value = s.title;
                document.getElementById('in-room').value = s.room;
                document.getElementById('in-year').value = s.year;
                document.getElementById('in-mode').value = s.mode;
                document.getElementById('in-layout').value = s.layout;
                schoolLogo = s.schoolLogo || LOGO_KAB_BEKASI;
                handleStatusChange();
            }
            if (savedStudents) { students = JSON.parse(savedStudents); }
            updateUI();
        }

        async function clearData() {
            if(confirm("Hapus semua data (Termasuk foto) yang tersimpan?")) {
                localStorage.clear();
                await clearPhotosDB();
                location.reload();
            }
        }

        function toggleAccordion(header) {
            const content = header.nextElementSibling;
            const isActive = header.classList.contains('active');
            document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('show'));
            document.querySelectorAll('.accordion-header').forEach(h => h.classList.remove('active'));
            if (!isActive) { content.classList.add('show'); header.classList.add('active'); }
        }

        function handleStatusChange() {
            const status = document.getElementById('in-status').value;
            const uploadGroup = document.getElementById('logo-upload-group');
            if (status === 'negeri') { schoolLogo = LOGO_KAB_BEKASI; uploadGroup.style.display = 'none'; }
            else { uploadGroup.style.display = 'block'; }
            saveSettingsToLocal();
            updateUI();
        }

        function handleLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { schoolLogo = e.target.result; saveSettingsToLocal(); updateUI(); }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function downloadTemplate() {
            const csvContent = "data:text/csv;charset=utf-8,No Peserta,NISN,Nama\n2602126401,0123456789,BUDI SANTOSO";
            window.open(encodeURI(csvContent));
        }

        document.getElementById('import-excel').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
                students = json.slice(1).filter(r => r.length >= 2).map(r => ({
                    no: String(r[0] || ''),
                    nisn: String(r[1] || '').trim(),
                    nama: String(r[2] || '')
                }));
                saveSettingsToLocal();
                updateUI();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        document.getElementById('import-photos').addEventListener('change', async function(e) {
            const files = e.target.files;
            const newPhotos = {};
            for (let file of files) {
                if (file.name.endsWith('.zip')) {
                    const zip = await JSZip.loadAsync(file);
                    for (let filename in zip.files) {
                        const zipEntry = zip.files[filename];
                        if (!zipEntry.dir && /\.(jpe?g|png|webp)$/i.test(filename)) {
                            const blob = await zipEntry.async("blob");
                            const base64 = await blobToBase64(blob);
                            const cleanName = filename.split('/').pop().split('.')[0].trim();
                            newPhotos[cleanName] = base64;
                            photoMap[cleanName] = base64;
                        }
                    }
                } else {
                    const base64 = await blobToBase64(file);
                    const cleanName = file.name.split('.')[0].trim();
                    newPhotos[cleanName] = base64;
                    photoMap[cleanName] = base64;
                }
            }
            await savePhotosToDB(newPhotos);
            updateUI();
        });

        function blobToBase64(blob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }

        function updateUI() {
            const container = document.getElementById('pages-container');
            if(!container) return;
            container.innerHTML = '';
            const mode = document.getElementById('in-mode').value;
            const layout = document.getElementById('in-layout').value;
            const itemsPerPage = 20;

            if (students.length === 0) {
                container.innerHTML = createPageHtml([], layout, mode, 0);
                return;
            }

            for (let i = 0; i < students.length; i += itemsPerPage) {
                const chunk = students.slice(i, i + itemsPerPage);
                container.innerHTML += createPageHtml(chunk, layout, mode, Math.floor(i / itemsPerPage));
            }
            saveSettingsToLocal();
        }

        function createPageHtml(data, layout, mode, pageIndex) {
            let displayData = new Array(20).fill(null);
            if (layout === 'vertical') {
                let current = 0;
                for (let col = 0; col < 4; col++) {
                    for (let row = 0; row < 5; row++) {
                        let gridIdx = (row * 4) + col;
                        if (data[current]) { displayData[gridIdx] = data[current]; current++; }
                    }
                }
            } else { data.forEach((s, i) => displayData[i] = s); }

            let gridContent = '';
            if (mode === 'album') {
                displayData.forEach(s => {
                    if (!s) { gridContent += `<div class="student-card" style="visibility:hidden"></div>`; return; }
                    const imgSource = photoMap[s.nisn];
                    const photoDisplay = imgSource ? `<img src="${imgSource}">` : `<div class="no-img-text">TIDAK ADA FOTO<br>${s.nisn}</div>`;
                    gridContent += `<div class="student-card"><div class="photo-frame">${photoDisplay}</div><div class="id-label">${s.no}</div><div class="student-info">NISN: ${s.nisn}</div></div>`;
                });
            } else {
                displayData.forEach(s => {
                    if (!s) { gridContent += `<div class="seat-card" style="visibility:hidden"></div>`; return; }
                    gridContent += `<div class="seat-card"><div class="seat-header">NOMOR PESERTA</div><div class="seat-number">${s.no}</div><div class="seat-footer"><div class="footer-left"></div><div class="footer-right"></div></div></div>`;
                });
            }

            let currentTitle = (pageIndex === 0) ? document.getElementById('in-title').value : `${(mode === 'album' ? "ALBUM FOTO" : "DENAH KURSI")} PENILAIAN SUMATIF AKHIR JENJANG (PSAJ)`;
            const baseRoom = parseInt(document.getElementById('in-room').value) || 1;
            const currentRoom = (baseRoom + pageIndex).toString().padStart(3, '0');

            return `
                <div class="page">
                    <div class="header">
                        <img class="logo-img" src="${schoolLogo}" alt="Logo">
                        <h1>PEMERINTAH KABUPATEN BEKASI</h1>
                        <h1>DINAS PENDIDIKAN</h1>
                        <h2>${document.getElementById('in-school').value}</h2>
                        <h1>${document.getElementById('in-dist').value}</h1>
                        <p>${document.getElementById('in-addr').value}</p>
                        <p class="email-text">Email: ${document.getElementById('in-email').value}</p>
                    </div>
                    <div class="sub-header">
                        <h4>${currentTitle}</h4>
                        <div style="font-size:8pt; font-weight:bold; margin-top:2px">RUANGAN</div>
                        <div class="room-box">${currentRoom}</div>
                        <div class="year-text">TAHUN PELAJARAN ${document.getElementById('in-year').value}</div>
                    </div>
                    ${mode === 'denah' ? '<div class="teacher-desk">MEJA PENGAWAS</div>' : ''}
                    <div class="${mode === 'album' ? 'photo-grid' : 'denah-grid'}">${gridContent}</div>
                </div>`;
        }

        window.onload = loadFromLocal;
    </script>
</body>
</html>
