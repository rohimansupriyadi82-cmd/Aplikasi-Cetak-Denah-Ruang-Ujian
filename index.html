<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USP & PSAJ Precision - F4 Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 360px;
            --primary: #064e3b;
            --primary-dark: #022c22;
            --accent: #10b981;
            --bg-canvas: #f1f5f9;
            --light-green: #f0fff4; 
            --purple-shaded: #b4a7d6; /* Warna ungu sesuai gambar */
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; display: flex;
            background-color: var(--bg-canvas); color: #1e293b;
        }

        /* SIDEBAR STYLING */
        .sidebar {
            width: var(--sidebar-width); height: 100vh;
            background: var(--primary); position: fixed;
            left: 0; top: 0; display: flex; flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2); z-index: 1000; color: #ffffff;
        }
        .sidebar-header { padding: 25px; background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h3 { margin: 0; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .nav-tabs { display: flex; background: rgba(0,0,0,0.2); padding: 5px; margin: 10px 15px; border-radius: 10px; gap: 5px; }
        .nav-btn { flex: 1; padding: 10px 5px; border: none; border-radius: 8px; background: transparent; color: white; font-size: 9px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .nav-btn.active { background: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }
        .accordion-item { background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .accordion-header { padding: 14px 18px; cursor: pointer; font-weight: 700; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .accordion-header.active { background: rgba(255,255,255,0.1); }
        .accordion-content { padding: 0 18px; max-height: 0; overflow: hidden; transition: 0.4s ease-out; background: rgba(0,0,0,0.1); }
        .accordion-content.show { padding: 18px; max-height: 2500px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 9px; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; opacity: 0.7; color: #fff; }
        .form-group input, .form-group select { width: 100%; padding: 9px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; font-size: 12px; background: rgba(255,255,255,0.1); color: white; outline: none; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-outline { border: 1px solid rgba(255,255,255,0.3); background: transparent; color: #ffffff; }

        .created-by { text-align: center; font-size: 10px; opacity: 0.5; margin-top: 10px; padding-bottom: 20px; font-weight: 600; letter-spacing: 1px; }

        /* PREVIEW AREA */
        .main-content { margin-left: var(--sidebar-width); flex-grow: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; }

        /* PAPER F4 PRECISION (215x330mm) */
        .page {
            width: 215mm; height: 330mm;
            padding: 10mm 15mm; background: white;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1);
            position: relative; margin-bottom: 30px;
            display: flex; flex-direction: column;
            overflow: hidden; page-break-after: always; color: #000;
        }

        /* HEADER */
        .header { text-align: center; border-bottom: 4px double #000; padding-bottom: 6px; margin-bottom: 10px; position: relative; flex-shrink: 0; }
        .logo-img { position: absolute; left: 10mm; top: 0; width: 85px; height: 100px; object-fit: contain; }
        .header h1 { margin: 0; font-size: 11.5pt; text-transform: uppercase; line-height: 1.2; font-weight: 700; }
        .header h2 { margin: 1px 0; font-size: 17pt; font-weight: 900; text-transform: uppercase; line-height: 1.1; }
        .header p { margin: 1px 0; font-size: 8.5pt; font-weight: 600; line-height: 1.2; }

        /* TABLES */
        .abs-table { width: 100%; border-collapse: collapse; border: 1.5px solid #000; table-layout: fixed; }
        .abs-table th { background: #eeeeee; border: 1px solid #000; padding: 6px; font-size: 8.5pt; text-transform: uppercase; }
        .abs-table td { border: 1px solid #000; padding: 0 8px; font-size: 10pt; height: 10.2mm; vertical-align: middle; }
        .abs-table tbody tr:nth-child(even) { background-color: var(--light-green); } 
        
        .zigzag-ttd { display: flex; align-items: center; width: 100%; height: 100%; font-size: 9pt; font-weight: 700; }

        .footer-sig { margin-top: auto; display: flex; justify-content: flex-end; padding-bottom: 5mm; padding-right: 15mm; }
        .sig-box { min-width: 250px; font-size: 10pt; text-align: center; line-height: 1.3; }

        /* PHOTO GRID */
        .photo-grid { display: grid; gap: 10px 15px; justify-items: center; flex-grow: 1; align-content: flex-start; width: 100%; }

        /* MEJA PENGAWAS */
        .meja-pengawas {
            align-self: flex-start;
            margin-bottom: 25px;
            padding: 8px 15px;
            border: 2px solid #000;
            background: #d9d2e9;
            font-weight: 800;
            font-size: 11pt;
            text-transform: uppercase;
        }
        
        /* STUDENT CARD (ALBUM MODE) */
        .student-card { width: 4.1cm; display: flex; flex-direction: column; align-items: center; }
        .photo-frame { width: 3cm; height: 3.8cm; border: 1px solid #000; background: #fff; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .id-label { margin-top: 3px; background: #ffff00; border: 1.2px solid #000; width: 3.6cm; text-align: center; font-weight: 800; font-size: 8.5pt; padding: 2px 0; }

        /* DENAH CARD (FORMAT BARU SESUAI GAMBAR) */
        .denah-card { 
            width: 4.6cm; height: 4.5cm; border: 2px solid #000; 
            display: flex; flex-direction: column;
            background: #fff; overflow: hidden;
        }
        .denah-row-1 {
            border-bottom: 2px solid #000;
            text-align: center; font-size: 8.5pt; font-weight: 800;
            padding: 4px 0; background: #fff;
        }
        .denah-row-2 {
            border-bottom: 2px solid #000;
            text-align: center; font-size: 11pt; font-weight: 900;
            padding: 6px 0; background: #fff;
        }
        .denah-row-bottom {
            display: flex; flex-grow: 1;
        }
        .denah-box-photo {
            flex: 1; border-right: 2px solid #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .denah-box-photo img { width: 100%; height: 100%; object-fit: cover; }
        .denah-box-name {
            flex: 1; background: var(--purple-shaded);
            display: flex; align-items: center; justify-content: center;
            padding: 5px; text-align: center;
            font-size: 7.5pt; font-weight: 800; line-height: 1.1;
            text-transform: uppercase; word-break: break-word;
        }

        @media print {
            @page { size: 215mm 330mm; margin: 0; }
            body { background: white; }
            .sidebar, .no-print { display: none !important; }
            .main-content { margin: 0; padding: 0; }
            .page { box-shadow: none; margin: 0; border: none; width: 215mm; height: 330mm; page-break-after: always; }
        }
    </style>
</head>
<body>

    <div class="sidebar no-print">
        <div class="sidebar-header">
            <h3>PSAJ PRECISION F4</h3>
        </div>

        <div class="nav-tabs">
            <button class="nav-btn active" id="tab-main" onclick="switchMode('main')">Album & Denah</button>
            <button class="nav-btn" id="tab-absen" onclick="switchMode('absen')">Daftar Hadir Siswa</button>
            <button class="nav-btn" id="tab-pengawas" onclick="switchMode('pengawas')">Daftar Pengawas</button>
        </div>

        <div class="sidebar-content">
            <!-- 1. DATA INSTANSI -->
            <div class="accordion-item">
                <div class="accordion-header active" onclick="toggleAccordion(this)"><i>🏢 DATA INSTANSI (SENTRAL)</i><span>▼</span></div>
                <div class="accordion-content show">
                    <div class="form-group"><label>Status Sekolah</label><select id="in-status" onchange="handleStatusChange()"><option value="negeri">Negeri (Kab. Bekasi)</option><option value="swasta">Swasta (Kustom)</option></select></div>
                    <div class="form-group" id="yayasan-group" style="display:none;"><label>Nama Yayasan</label><input type="text" id="in-yayasan" value="YAYASAN PENDIDIKAN ISLAM" oninput="updateUI()"></div>
                    <div class="form-group" id="logo-upload-group" style="display:none;"><label>Upload Logo</label><input type="file" id="in-logo" accept="image/*" onchange="handleLogo(this)"></div>
                    <div class="form-group"><label>Nama Sekolah</label><input type="text" id="in-school" value="SDN MUARA BAKTI 01" oninput="updateUI()"></div>
                    <div class="form-group"><label>Kecamatan</label><input type="text" id="in-dist" value="KECAMATAN BABELAN" oninput="updateUI()"></div>
                    <div class="form-group"><label>Alamat</label><input type="text" id="in-addr" value="Jl. Bayangkara Rt. 12/07 Ds. Muara Bakti Kec. Babelan Kab. Bekasi" oninput="updateUI()"></div>
                    <div class="form-group"><label>Email</label><input type="text" id="in-email" value="sdnmuarabakti01@gmail.com" oninput="updateUI()"></div>
                    <div class="form-group"><label>Tahun Pelajaran</label><input type="text" id="in-year" value="2025/2026" oninput="updateUI()"></div>
                </div>
            </div>

            <!-- 2. ALBUM & DENAH -->
            <div id="panel-main">
                <div class="accordion-item">
                    <div class="accordion-header active" onclick="toggleAccordion(this)"><i>🖼️ SETTING ALBUM & DENAH</i><span>▼</span></div>
                    <div class="accordion-content show">
                        <button class="btn btn-outline" onclick="downloadTemplate()">📥 Template Excel</button>
                        <div class="form-group"><label>1. Upload Excel</label><input type="file" id="import-excel" accept=".xlsx, .xls"></div>
                        <div class="form-group"><label>2. Upload ZIP Foto</label><input type="file" id="import-photos" multiple accept="image/*, .zip"></div>
                        <hr style="border: 0.5px solid rgba(255,255,255,0.1);">
                        <div class="form-group"><label>Judul Album Foto</label><input type="text" id="title-album" value="ALBUM FOTO PENILAIAN SUMATIF AKHIR JENJANG (PSAJ)" oninput="updateUI()"></div>
                        <div class="form-group"><label>Judul Denah Tempat Duduk</label><input type="text" id="title-denah" value="DENAH TEMPAT DUDUK PENILAIAN SUMATIF AKHIR JENJANG (PSAJ)" oninput="updateUI()"></div>
                        <div class="form-group"><label>Mode Dokumen</label><select id="in-mode" onchange="updateUI()"><option value="album">Album Foto Peserta</option><option value="denah">Denah Kursi Peserta</option></select></div>
                        <div class="form-group"><label>Tata Letak (Urutan)</label><select id="in-layout" onchange="updateUI()"><option value="zigzag">Zigzag (Sesuai Gambar)</option><option value="vertical">Vertical (Kolom)</option></select></div>
                        <div class="form-group"><label>Siswa Per Halaman</label><select id="in-perpage" onchange="updateUI()"><option value="20">20 Siswa (4 Kolom)</option><option value="15">15 Siswa (3 Kolom)</option></select></div>
                        <div class="form-group"><label>Ruangan Mulai</label><input type="number" id="in-room" value="1" oninput="updateUI()"></div>
                    </div>
                </div>
            </div>

            <!-- 3. DAFTAR HADIR SISWA -->
            <div id="panel-absen" style="display:none;">
                <div class="accordion-item">
                    <div class="accordion-header active" onclick="toggleAccordion(this)"><i>📝 SETTING DAFTAR HADIR SISWA</i><span>▼</span></div>
                    <div class="accordion-content show">
                        <div class="form-group"><label>Judul Daftar Hadir Peserta</label><input type="text" id="title-absen" value="DAFTAR HADIR PESERTA PENILAIAN SUMATIF AKHIR JENJANG (PSAJ)" oninput="updateUI()"></div>
                        <div class="form-group"><label>Mata Pelajaran</label><input type="text" id="abs-mapel" value="BAHASA INDONESIA" oninput="updateUI()"></div>
                        <div class="form-group"><label>Hari, Tanggal</label><input type="text" id="abs-date" value="Senin, 11 Mei 2026" oninput="updateUI()"></div>
                        <div class="form-group"><label>Waktu</label><input type="text" id="abs-time" value="08.00 - 09.30" oninput="updateUI()"></div>
                        <div class="form-group"><label>Kota/Titi Mangsa</label><input type="text" id="abs-city" value="Babelan" oninput="updateUI()"></div>
                        <div class="form-group"><label>Nama Pengawas</label><input type="text" id="abs-p-name" value="NAMA PENGAWAS" oninput="updateUI()"></div>
                        <div class="form-group"><label>NIP Pengawas</label><input type="text" id="abs-p-nip" value="19870101 202001 1 001" oninput="updateUI()"></div>
                    </div>
                </div>
            </div>

            <!-- 4. DAFTAR HADIR PENGAWAS -->
            <div id="panel-pengawas" style="display:none;">
                <div class="accordion-item">
                    <div class="accordion-header active" onclick="toggleAccordion(this)"><i>👨‍🏫 SETTING DAFTAR HADIR PENGAWAS</i><span>▼</span></div>
                    <div class="accordion-content show">
                        <div class="form-group"><label>Judul Daftar Hadir Pengawas</label><input type="text" id="title-pengawas" value="DAFTAR HADIR PENGAWAS PENILAIAN SUMATIF AKHIR JENJANG (PSAJ)" oninput="updateUI()"></div>
                        <div class="form-group"><label>Mata Pelajaran (Pengawas)</label><input type="text" id="p-mapel" value="BAHASA INDONESIA" oninput="updateUI()"></div>
                        <div class="form-group"><label>Hari, Tanggal (Pengawas)</label><input type="text" id="p-date" value="Senin, 11 Mei 2026" oninput="updateUI()"></div>
                        <div class="form-group"><label>Waktu (Pengawas)</label><input type="text" id="p-time" value="08.00 - 09.30" oninput="updateUI()"></div>
                        <hr style="border: 0.5px solid rgba(255,255,255,0.1);">
                        <div class="form-group">
                            <label>Format List</label>
                            <select id="p-format" onchange="togglePengawasInputs()">
                                <option value="6">6 Pengawas (3 Ruang)</option>
                                <option value="4" selected>4 Pengawas (2 Ruang)</option>
                                <option value="2-2">2 Pengawas 2 Ruang (1 Per Ruang)</option>
                                <option value="2">2 Pengawas (1 Ruang)</option>
                            </select>
                        </div>
                        <div id="p-inputs-container"></div>
                        <hr style="border: 0.5px solid rgba(255,255,255,0.1);">
                        <div class="form-group"><label>Ketua Panitia</label><input type="text" id="p-ketua" value="ROHIMAN KHAN" oninput="updateUI()"></div>
                        <div class="form-group"><label>NIP Ketua</label><input type="text" id="p-nip" value="198412182025211003" oninput="updateUI()"></div>
                    </div>
                </div>
            </div>

            <button class="btn btn-blue" onclick="window.print()">🖨️ CETAK SEKARANG (F4)</button>
            <button class="btn btn-outline" style="background:#ef4444; color:white; border:none;" onclick="clearData()">🗑️ Hapus Data</button>
            <div class="created-by">Created Rohiman Supriyadi</div>
        </div>
    </div>

    <div class="main-content" id="pages-container"></div>

    <script>
        const LOGO_KAB_BEKASI = "https://freeimghost.com/images/2026/01/22/Kabupaten-Bekasi.md.png";
        let students = [];
        let photoMap = {};
        let schoolLogo = LOGO_KAB_BEKASI;
        let activeTab = 'main';

        function switchMode(m) {
            activeTab = m;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + m).classList.add('active');
            document.getElementById('panel-main').style.display = (m === 'main') ? 'block' : 'none';
            document.getElementById('panel-absen').style.display = (m === 'absen') ? 'block' : 'none';
            document.getElementById('panel-pengawas').style.display = (m === 'pengawas') ? 'block' : 'none';
            updateUI();
        }

        function toggleAccordion(h) {
            h.classList.toggle('active');
            h.nextElementSibling.classList.toggle('show');
        }

        function handleStatusChange() {
            const s = document.getElementById('in-status').value;
            document.getElementById('yayasan-group').style.display = (s === 'swasta') ? 'block' : 'none';
            document.getElementById('logo-upload-group').style.display = (s === 'swasta') ? 'block' : 'none';
            if (s !== 'swasta') schoolLogo = LOGO_KAB_BEKASI;
            updateUI();
        }

        function handleLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { schoolLogo = e.target.result; updateUI(); }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function togglePengawasInputs() {
            let val = document.getElementById('p-format').value;
            let count = val === '2-2' ? 2 : parseInt(val);
            const container = document.getElementById('p-inputs-container');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) {
                container.innerHTML += `<div class="form-group"><label>Pengawas ${i}</label><input type="text" id="p-name-${i}" placeholder="Nama Pengawas ${i}" oninput="updateUI()"></div>`;
            }
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';
            
            if (activeTab === 'pengawas') {
                container.innerHTML = renderPengawasPage();
                return;
            }

            const perPage = (activeTab === 'main') ? parseInt(document.getElementById('in-perpage').value) : 20;
            const data = students.length > 0 ? students : Array(perPage).fill(null);

            for (let i = 0; i < data.length; i += perPage) {
                const chunk = data.slice(i, i + perPage);
                const pageIdx = Math.floor(i / perPage);
                if (activeTab === 'main') container.innerHTML += renderMainPage(chunk, perPage, pageIdx);
                else container.innerHTML += renderAbsenPage(chunk, perPage, pageIdx);
            }
        }

        function renderKop() {
            const status = document.getElementById('in-status').value;
            const school = document.getElementById('in-school').value;
            const dist = document.getElementById('in-dist').value;
            const addr = document.getElementById('in-addr').value;
            const email = document.getElementById('in-email').value;

            return `
            <div class="header">
                <img class="logo-img" src="${schoolLogo}">
                <h1>PEMERINTAH KABUPATEN BEKASI</h1>
                <h1>DINAS PENDIDIKAN</h1>
                ${status === 'swasta' ? `<h1>${document.getElementById('in-yayasan').value}</h1>` : ''}
                <h2>${school}</h2>
                <h1>${dist}</h1>
                <p>${addr}</p>
                <p style="color:blue; text-decoration:underline;">Email: ${email}</p>
            </div>`;
        }

        function renderMainPage(chunk, perPage, pageIdx) {
            const mode = document.getElementById('in-mode').value;
            const layout = document.getElementById('in-layout').value;
            const year = document.getElementById('in-year').value;
            const startRoom = parseInt(document.getElementById('in-room').value || 1);
            const currentRoom = (startRoom + pageIdx).toString().padStart(3, '0');
            const cols = (perPage == 15) ? 3 : 4;
            const displayTitle = (mode === 'album') ? document.getElementById('title-album').value : document.getElementById('title-denah').value;

            // Logika Penyusunan
            let ordered = new Array(perPage).fill(null);
            if (layout === 'vertical') {
                let count = 0;
                let numRows = perPage / cols;
                for (let c = 0; c < cols; c++) {
                    for (let r = 0; r < numRows; r++) {
                        let targetIdx = (r * cols) + c;
                        if (count < chunk.length) ordered[targetIdx] = chunk[count++];
                    }
                }
            } else {
                // Zigzag Sesuai Gambar (Snake Pattern: 1,2,3,4 then 8,7,6,5)
                let count = 0;
                let numRows = perPage / cols;
                for (let r = 0; r < numRows; r++) {
                    if (r % 2 === 0) { // Genap: Kiri ke Kanan
                        for (let c = 0; c < cols; c++) {
                            if (count < chunk.length) ordered[r * cols + c] = chunk[count++];
                        }
                    } else { // Ganjil: Kanan ke Kiri
                        for (let c = cols - 1; c >= 0; c--) {
                            if (count < chunk.length) ordered[r * cols + c] = chunk[count++];
                        }
                    }
                }
            }

            let gridHtml = '';
            ordered.forEach(s => {
                if (!s) { gridHtml += `<div class="${mode}-card" style="visibility:hidden"></div>`; return; }
                const imgUrl = photoMap[s.nisn] || "";
                const imgHtml = imgUrl ? `<img src="${imgUrl}">` : `<div style="font-size:6pt; opacity:0.3; text-align:center">FOTO<br>${s.nisn}</div>`;
                
                if (mode === 'album') {
                    gridHtml += `
                    <div class="student-card">
                        <div class="photo-frame">${imgHtml}</div>
                        <div class="id-label">${s.no}</div>
                        <div style="font-size:7pt; font-weight:800; margin-top:2px;">NISN: ${s.nisn}</div>
                    </div>`;
                } else {
                    // DENAH FORMAT SESUAI GAMBAR
                    gridHtml += `
                    <div class="denah-card">
                        <div class="denah-row-1">NOMOR PESERTA</div>
                        <div class="denah-row-2">${s.no}</div>
                        <div class="denah-row-bottom">
                            <div class="denah-box-photo">${imgHtml}</div>
                            <div class="denah-box-name">${s.nama}</div>
                        </div>
                    </div>`;
                }
            });

            return `
            <div class="page">
                ${renderKop()}
                <div style="text-align:center; margin-bottom:10px;">
                    <div style="border:1.5px solid #000; display:inline-block; padding:3px 15px; font-weight:800; font-size:9.5pt; text-transform:uppercase;">${displayTitle}</div>
                    <div style="margin-top:5px; font-weight:700;">RUANGAN: <span style="border:2px solid #000; padding:1px 12px; font-size:14pt; background:#eee;">${currentRoom}</span></div>
                </div>
                ${mode === 'denah' ? '<div class="meja-pengawas">MEJA PENGAWAS</div>' : ''}
                <div class="photo-grid" style="grid-template-columns: repeat(${cols}, 1fr);">${gridHtml}</div>
            </div>`;
        }

        function renderAbsenPage(chunk, perPage, pageIdx) {
            const year = document.getElementById('in-year').value;
            const mapel = document.getElementById('abs-mapel').value;
            const date = document.getElementById('abs-date').value;
            const time = document.getElementById('abs-time').value;
            const startRoom = parseInt(document.getElementById('in-room').value || 1);
            const currentRoom = (startRoom + pageIdx).toString().padStart(3, '0');
            const displayTitle = document.getElementById('title-absen').value;

            const filteredChunk = chunk.filter(s => s !== null);
            
            let rowsHtml = '';
            filteredChunk.forEach((s, i) => {
                const num = (pageIdx * perPage) + i + 1;
                const ttd = num % 2 !== 0 ? `${num}. .................` : `<div style="padding-left:50px;">${num}. .................</div>`;
                rowsHtml += `<tr>
                    <td align="center">${num}</td>
                    <td align="center" style="font-size:9pt;">${s.no}</td>
                    <td style="font-weight:700; font-size:9pt; text-transform:uppercase;">${s.nama}</td>
                    <td><div class="zigzag-ttd">${ttd}</div></td>
                </tr>`;
            });

            if (students.length === 0) {
                for(let i=0; i<20; i++) {
                    const num = i + 1;
                    const ttd = num % 2 !== 0 ? `${num}. .................` : `<div style="padding-left:50px;">${num}. .................</div>`;
                    rowsHtml += `<tr><td align="center">${num}</td><td></td><td></td><td><div class="zigzag-ttd">${ttd}</div></td></tr>`;
                }
            }

            return `
            <div class="page">
                ${renderKop()}
                <div style="text-align:center; font-weight:800; font-size:11pt; margin-bottom:10px; text-transform:uppercase;">${displayTitle}</div>
                <table style="width:100%; margin-bottom:8px; font-weight:700; font-size:9.5pt;">
                    <tr><td width="130">MATA PELAJARAN</td><td>: ${mapel}</td><td width="80">RUANG</td><td>: ${currentRoom}</td></tr>
                    <tr><td>HARI, TANGGAL</td><td>: ${date}</td><td>TAHUN</td><td>: ${year}</td></tr>
                    <tr><td>WAKTU</td><td colspan="3">: ${time}</td></tr>
                </table>
                <table class="abs-table"><thead><tr><th width="40">NO</th><th width="150">NO PESERTA</th><th>NAMA PESERTA</th><th width="190">TANDA TANGAN</th></tr></thead><tbody>${rowsHtml}</tbody></table>
                <div class="footer-sig">
                    <div class="sig-box">
                        ${document.getElementById('abs-city').value}, ${date.split(',')[1] || ''}<br>
                        Pengawas Ruang,<br><br><br><br>
                        <b>${document.getElementById('abs-p-name').value}</b><br>
                        NIP. ${document.getElementById('abs-p-nip').value}
                    </div>
                </div>
            </div>`;
        }

        function renderPengawasPage() {
            const format = document.getElementById('p-format').value;
            const year = document.getElementById('in-year').value;
            const mapel = document.getElementById('p-mapel').value;
            const date = document.getElementById('p-date').value;
            const time = document.getElementById('p-time').value;
            const displayTitle = document.getElementById('title-pengawas').value;
            
            let rowsHtml = '';
            if(format === '2-2') {
                for(let i=1; i<=2; i++) {
                    const name = document.getElementById('p-name-'+i)?.value || "....................................";
                    rowsHtml += `<tr><td align="center">${i}.</td><td style="text-transform:uppercase; font-weight:700;">${name}</td><td align="center" style="font-size:24pt; font-weight:900;">${i}</td><td><div class="zigzag-ttd">${i}. .....................</div></td></tr>`;
                }
            } else {
                let count = parseInt(format);
                for(let i=1; i<=count; i++) {
                    const name = document.getElementById('p-name-'+i)?.value || "....................................";
                    const roomCell = (i % 2 !== 0) ? `<td rowspan="2" align="center" style="font-size:28pt; font-weight:900;">${Math.ceil(i/2)}</td>` : '';
                    const ttd = (i % 2 !== 0) ? `${i}. .....................` : `<div style="padding-left:60px;">${i}. .....................</div>`;
                    rowsHtml += `<tr><td align="center">${i}.</td><td style="text-transform:uppercase; font-weight:700;">${name}</td>${roomCell}<td><div class="zigzag-ttd">${ttd}</div></td></tr>`;
                }
            }

            return `
            <div class="page">
                ${renderKop()}
                <div style="text-align:center; font-weight:800; font-size:12pt; margin-bottom:15px; text-transform:uppercase;">${displayTitle}</div>
                <div style="margin-left: 50px; margin-bottom: 20px; font-weight: 700; font-size: 10.5pt;">
                    <table border="0" cellpadding="4">
                        <tr><td width="160">Mata Pelajaran</td><td>: ${mapel}</td></tr>
                        <tr><td>Hari/Tanggal</td><td>: ${date}</td></tr>
                        <tr><td>Jam</td><td>: ${time}</td></tr>
                    </table>
                </div>
                <table class="abs-table">
                    <thead><tr><th width="45">No.</th><th>Nama Pengawas</th><th width="90">Ruang</th><th width="220">Tanda Tangan</th></tr></thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
                <div class="footer-sig" style="margin-top:40px;">
                    <div class="sig-box">Ketua Panitia Pelaksana<br><br><br><br><br><u><b>${document.getElementById('p-ketua').value}</b></u><br>NIP. ${document.getElementById('p-nip').value}</div>
                </div>
            </div>`;
        }

        document.getElementById('import-excel').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                students = json.slice(1).filter(r => r.length >= 2).map(r => ({ no: String(r[0]||''), nisn: String(r[1]||''), nama: String(r[2]||'') }));
                updateUI();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        document.getElementById('import-photos').addEventListener('change', async function(e) {
            const files = e.target.files;
            for (let f of files) {
                if (f.name.endsWith('.zip')) {
                    const zip = await JSZip.loadAsync(f);
                    for (let name in zip.files) {
                        if (!zip.files[name].dir) {
                            const blob = await zip.files[name].async("blob");
                            const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
                            photoMap[name.split('/').pop().split('.')[0]] = b64;
                        }
                    }
                } else {
                    const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(f); });
                    photoMap[f.name.split('.')[0]] = b64;
                }
            }
            updateUI();
        });

        function downloadTemplate() {
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet([["No Peserta", "NISN", "Nama Peserta"], ["26-001-001-8", "1234567890", "ROHIMAN KHAN"]]);
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Template_PSAJ_Precision.xlsx");
        }

        function clearData() { if(confirm("Hapus semua data?")) { students = []; photoMap = {}; updateUI(); } }

        window.onload = () => { togglePengawasInputs(); switchMode('main'); };
    </script>
</body>
</html>
